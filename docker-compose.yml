services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ndl
      POSTGRES_PASSWORD: ndl_dev_password
      POSTGRES_DB: ndl
    ports:
      - "5432:5432"
    volumes:
      - ndl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndl -d ndl"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ndl-postgres-data:
